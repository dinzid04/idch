<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HuTao MD - Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: #0b0f1c; color: white; display: flex; flex-direction: column; align-items: center; min-height: 100vh; padding: 2rem; }
        .container { width: 100%; max-width: 500px; display: flex; flex-direction: column; gap: 2rem; }
        .card { background: rgba(18, 22, 40, 0.9); border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 2rem; padding: 2.5rem; text-align: center; box-shadow: 0 20px 40px rgba(0, 0, 0, 0.5); }
        h1, h2 { font-size: 2rem; margin-bottom: 0.5rem; color: #fff; }
        h2 { font-size: 1.5rem; }
        .sub { color: #94a3b8; margin-bottom: 2rem; font-size: 0.9rem; }
        .input-box { position: relative; margin-bottom: 1.5rem; }
        .input-box i { position: absolute; left: 1.2rem; top: 50%; transform: translateY(-50%); color: #4f46e5; }
        .input-box input { width: 100%; padding: 1.2rem 1.2rem 1.2rem 3.5rem; background: #101629; border: 2px solid #2d334f; border-radius: 1.2rem; color: white; font-size: 1.1rem; outline: none; }
        .input-box input:focus { border-color: #4f46e5; }
        .btn { width: 100%; padding: 1.2rem; background: linear-gradient(145deg, #4f46e5, #7c3aed); border: none; border-radius: 1.2rem; color: white; font-weight: 700; font-size: 1.1rem; cursor: pointer; transition: 0.3s; }
        .btn:hover { transform: translateY(-2px); box-shadow: 0 10px 20px rgba(79, 70, 229, 0.4); }
        .btn:disabled { opacity: 0.6; cursor: not-allowed; transform: none; box-shadow: none; }
        .btn-refresh { background: #1e293b; border: 1px solid #334155; margin-bottom: 1.5rem; }
        .btn-stop { background: #ef4444; padding: 0.6rem 1.2rem; font-size: 0.9rem; border-radius: 0.8rem; width: auto; }
        .status-card { margin-top: 1.5rem; padding: 1.5rem; background: #101629; border-radius: 1.2rem; border: 1px solid #2d334f; display: none; }
        .code-display { font-size: 2.2rem; font-weight: 800; letter-spacing: 5px; color: #818cf8; margin-top: 10px; font-family: monospace; display: none; }
        .list-container { display: flex; flex-direction: column; gap: 10px; text-align: left; }
        .bot-item { background: #101629; border: 1px solid #2d334f; border-radius: 1rem; padding: 1.2rem; display: flex; justify-content: space-between; align-items: center; }
        .bot-info strong { font-size: 1.1rem; color: white; }
        .bot-info span { font-size: 0.85rem; display: block; margin-top: 4px; }
        .online { color: #22c55e; }
        .offline { color: #ef4444; }
    </style>
</head>
<body>
    <div class="container">
        <div class="card">
            <h1>HuTao MD Cloner</h1>
            <p class="sub">Masukkan nomor WhatsApp (contoh: 628xxx)</p>
            <div class="input-box">
                <i class="fas fa-phone"></i>
                <input type="number" id="nomor" placeholder="628123456789">
            </div>
            <button class="btn" id="btn" onclick="mintaKode()">Minta Kode Pairing</button>
            <div class="status-card" id="statusCard">
                <h3 id="statusTitle" style="color:#818cf8; margin-bottom:8px;">Menunggu</h3>
                <p id="statusMsg" style="font-size:0.9rem; color:#94a3b8;">Memproses ke server...</p>
                <div class="code-display" id="codeDisplay">----</div>
            </div>
        </div>

        <div class="card">
            <h2>Manajemen Bot Kamu</h2>
            <p class="sub">Hanya menampilkan bot yang dibuat di perangkat ini</p>
            <button class="btn btn-refresh" onclick="getDaftarBot()">
                <i class="fas fa-sync-alt"></i> Refresh Daftar
            </button>
            <div id="listBot" class="list-container">
                <p style="color:#94a3b8; text-align:center;">Belum ada bot yang kamu buat.</p>
            </div>
        </div>

        <div class="card">
            <h2>Cari Status Bot</h2>
            <p class="sub">Cek apakah nomor tertentu aktif sebagai bot</p>
            <div class="input-box">
                <i class="fas fa-search"></i>
                <input type="number" id="nomorCek" placeholder="628123456789">
            </div>
            <button class="btn btn-refresh" onclick="cekBotLain()">
                <i class="fas fa-search"></i> Cari Status
            </button>
            <div id="hasilCek" class="list-container" style="display: none; margin-top: 10px;"></div>
        </div>
    </div>

    <script>
        let intervalCek;

        function simpanBotLokal(nomor) {
            let botSaya = JSON.parse(localStorage.getItem('botSaya') || '[]');
            if (!botSaya.includes(nomor)) {
                botSaya.push(nomor);
                localStorage.setItem('botSaya', JSON.stringify(botSaya));
            }
        }

        function hapusBotLokal(nomor) {
            let botSaya = JSON.parse(localStorage.getItem('botSaya') || '[]');
            botSaya = botSaya.filter(n => n !== nomor);
            localStorage.setItem('botSaya', JSON.stringify(botSaya));
        }

        async function mintaKode() {
            const nomor = document.getElementById('nomor').value.replace(/\D/g, '');
            const btn = document.getElementById('btn');
            const statusCard = document.getElementById('statusCard');
            const statusTitle = document.getElementById('statusTitle');
            const statusMsg = document.getElementById('statusMsg');
            const codeDisplay = document.getElementById('codeDisplay');

            if (!nomor) return alert('Nomor harus diisi!');

            btn.disabled = true;
            btn.innerText = 'Memproses...';
            statusCard.style.display = 'block';
            codeDisplay.style.display = 'none';
            statusTitle.innerText = 'Menunggu';
            statusMsg.innerText = 'Bot sedang menyiapkan kode...';

            try {
                const res = await fetch('http://172.232.226.13:2413/api/pairing', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ nomor })
                });
                const data = await res.json();

                if (data.status) {
                    simpanBotLokal(nomor);
                    if (intervalCek) clearInterval(intervalCek);
                    intervalCek = setInterval(() => cekStatus(nomor), 3000);
                } else {
                    alert('Gagal: ' + data.msg);
                    btn.disabled = false;
                    btn.innerText = 'Minta Kode Pairing';
                }
            } catch (e) {
                alert('Koneksi ke server gagal!');
                btn.disabled = false;
                btn.innerText = 'Minta Kode Pairing';
            }
        }

        async function cekStatus(nomor) {
            try {
                const res = await fetch(`http://172.232.226.13:2413/api/pairing/status/${nomor}`);
                const data = await res.json();

                if (data.status && data.code) {
                    clearInterval(intervalCek);
                    document.getElementById('statusTitle').innerText = 'Kode Pairing Siap';
                    document.getElementById('statusMsg').innerText = 'Masukkan kode ini di WhatsApp:';
                    document.getElementById('codeDisplay').innerText = data.code;
                    document.getElementById('codeDisplay').style.display = 'block';
                    document.getElementById('btn').disabled = false;
                    document.getElementById('btn').innerText = 'Minta Ulang';
                    setTimeout(getDaftarBot, 5000);
                }
            } catch (e) {
                console.error(e);
            }
        }

        async function getDaftarBot() {
            const listDiv = document.getElementById('listBot');
            let botSaya = JSON.parse(localStorage.getItem('botSaya') || '[]');
            
            if (botSaya.length === 0) {
                listDiv.innerHTML = '<p style="color:#94a3b8; text-align:center;">Belum ada bot yang kamu buat di perangkat ini.</p>';
                return;
            }

            listDiv.innerHTML = '<p style="color:#94a3b8; text-align:center;">Mengambil data...</p>';
            try {
                const res = await fetch('http://172.232.226.13:2413/api/pairing/list');
                const data = await res.json();
                
                if (data.status) {
                    let botTampil = data.data.filter(bot => botSaya.includes(bot.nomor));
                    
                    if (botTampil.length > 0) {
                        let html = '';
                        botTampil.forEach(bot => {
                            let statusClass = bot.status === 'Online' ? 'online' : 'offline';
                            let icon = bot.status === 'Online' ? 'fa-check-circle' : 'fa-times-circle';
                            
                            html += `
                            <div class="bot-item">
                                <div class="bot-info">
                                    <strong>+${bot.nomor}</strong>
                                    <span class="${statusClass}"><i class="fas ${icon}"></i> ${bot.status}</span>
                                </div>
                                <button class="btn btn-stop" onclick="stopBot('${bot.nomor}')">
                                    <i class="fas fa-trash-alt"></i> Stop
                                </button>
                            </div>`;
                        });
                        listDiv.innerHTML = html;
                    } else {
                        listDiv.innerHTML = '<p style="color:#94a3b8; text-align:center;">Bot kamu sedang tidak aktif atau sudah terhapus.</p>';
                    }
                } else {
                    listDiv.innerHTML = '<p style="color:#ef4444; text-align:center;">Gagal mengambil data bot</p>';
                }
            } catch (e) {
                listDiv.innerHTML = '<p style="color:#ef4444; text-align:center;">Gagal menghubungi server</p>';
            }
        }

        async function stopBot(nomor) {
            if (!confirm('Yakin ingin mematikan dan menghapus sesi bot ' + nomor + '?')) return;
            try {
                const res = await fetch('http://172.232.226.13:2413/api/pairing/stop', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ nomor })
                });
                const data = await res.json();
                alert(data.msg);
                hapusBotLokal(nomor);
                getDaftarBot();
            } catch (e) {
                alert('Gagal menghubungi server');
            }
        }

        async function cekBotLain() {
            const nomorCek = document.getElementById('nomorCek').value.replace(/\D/g, '');
            const hasilDiv = document.getElementById('hasilCek');

            if (!nomorCek) return alert('Masukkan nomor yang ingin dicari!');

            hasilDiv.style.display = 'block';
            hasilDiv.innerHTML = '<p style="color:#94a3b8; text-align:center;">Mencari di server...</p>';

            try {
                const res = await fetch('http://172.232.226.13:2413/api/pairing/list');
                const data = await res.json();
                
                if (data.status) {
                    const botFind = data.data.find(b => b.nomor === nomorCek);
                    if (botFind) {
                        let statusClass = botFind.status === 'Online' ? 'online' : 'offline';
                        let icon = botFind.status === 'Online' ? 'fa-check-circle' : 'fa-times-circle';
                        
                        hasilDiv.innerHTML = `
                        <div class="bot-item">
                            <div class="bot-info">
                                <strong>+${botFind.nomor}</strong>
                                <span class="${statusClass}"><i class="fas ${icon}"></i> ${botFind.status}</span>
                            </div>
                        </div>`;
                    } else {
                        hasilDiv.innerHTML = '<p style="color:#ef4444; text-align:center;">Nomor tidak ditemukan di sistem.</p>';
                    }
                } else {
                    hasilDiv.innerHTML = '<p style="color:#ef4444; text-align:center;">Gagal mengambil data dari server.</p>';
                }
            } catch (e) {
                hasilDiv.innerHTML = '<p style="color:#ef4444; text-align:center;">Koneksi ke server gagal.</p>';
            }
        }

        window.onload = getDaftarBot;
    </script>
</body>
</html>
